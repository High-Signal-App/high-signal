name: backfill

on:
  workflow_dispatch:
    inputs:
      start:
        description: ISO start date (e.g. 2026-02-25)
        type: string
        required: true
      end:
        description: ISO end date (e.g. 2026-04-25)
        type: string
        required: true
      sources:
        description: csv (gdelt,edgar)
        type: string
        default: gdelt
      chunk_days:
        description: window chunk size
        type: string
        default: "7"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    defaults:
      run:
        working-directory: python/ingest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: uv sync
      - name: source availability diagnostic
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          API_BASE: ${{ secrets.API_BASE }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'high-signal sarthakagrawal927@gmail.com' }}
        run: uv run python -m high_signal_ingest.source_diagnose --require-persistence --require-sec-identity
      - name: backfill
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          API_BASE: ${{ secrets.API_BASE }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL || 'https://api.deepseek.com' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL || 'deepseek-v4-flash' }}
          AI_PROJECT_ID: high-signal
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'high-signal sarthakagrawal927@gmail.com' }}
        run: |
          uv run python -m high_signal_ingest.backfill \
            --start "${{ inputs.start }}" \
            --end "${{ inputs.end }}" \
            --sources "${{ inputs.sources }}" \
            --chunk-days "${{ inputs.chunk_days }}"
