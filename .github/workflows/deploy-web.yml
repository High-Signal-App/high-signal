name: Deploy web

on:
  workflow_dispatch:
jobs:
  deploy-production:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm cf:build
        working-directory: apps/web
        env:
          SKIP_NEXT_APP_BUILD: "false"
      - run: pnpm exec opennextjs-cloudflare deploy
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Smoke production web
        run: |
          curl --fail --silent --show-error --location --max-time 30 https://highsignal.app/ >/dev/null
          curl --fail --silent --show-error --location --max-time 30 https://highsignal.app/daily.json >/dev/null
