name: cron-ingest

on:
  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      source:
        description: source filter (all, or any value accepted by high_signal_ingest.pipeline --source)
        type: string
        default: all
      days:
        description: lookback days
        type: string
        default: "1"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: python/ingest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: uv sync
      - name: source availability diagnostic
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          API_BASE: ${{ secrets.API_BASE }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'high-signal sarthakagrawal927@gmail.com' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          REGULATIONS_GOV_API_KEY: ${{ secrets.REGULATIONS_GOV_API_KEY }}
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          PODCAST_INDEX_KEY: ${{ secrets.PODCAST_INDEX_KEY }}
          PODCAST_INDEX_SECRET: ${{ secrets.PODCAST_INDEX_SECRET }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          # US government APIs (free registration)
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          LDA_API_KEY: ${{ secrets.LDA_API_KEY }}
          FDA_API_KEY: ${{ secrets.FDA_API_KEY }}
          USDA_NASS_API_KEY: ${{ secrets.USDA_NASS_API_KEY }}
          # India government
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
          # Crypto on-chain
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          TOKEN_UNLOCKS_API_KEY: ${{ secrets.TOKEN_UNLOCKS_API_KEY }}
          # AI benchmarks
          ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Developer ecosystems
          LIBRARIES_IO_API_KEY: ${{ secrets.LIBRARIES_IO_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: uv run python -m high_signal_ingest.source_diagnose --require-persistence --require-sec-identity
      - name: ingest
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          API_BASE: ${{ secrets.API_BASE }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL || 'https://api.deepseek.com' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL || 'deepseek-v4-flash' }}
          AI_PROJECT_ID: high-signal
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'high-signal sarthakagrawal927@gmail.com' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          REGULATIONS_GOV_API_KEY: ${{ secrets.REGULATIONS_GOV_API_KEY }}
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          PODCAST_INDEX_KEY: ${{ secrets.PODCAST_INDEX_KEY }}
          PODCAST_INDEX_SECRET: ${{ secrets.PODCAST_INDEX_SECRET }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          # US government APIs (free registration)
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          LDA_API_KEY: ${{ secrets.LDA_API_KEY }}
          FDA_API_KEY: ${{ secrets.FDA_API_KEY }}
          USDA_NASS_API_KEY: ${{ secrets.USDA_NASS_API_KEY }}
          # India government
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
          # Crypto on-chain
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          TOKEN_UNLOCKS_API_KEY: ${{ secrets.TOKEN_UNLOCKS_API_KEY }}
          # AI benchmarks
          ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Developer ecosystems
          LIBRARIES_IO_API_KEY: ${{ secrets.LIBRARIES_IO_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          # Batch generation tuning
          EDGAR_TICKER_LIMIT: "25"
          SIGNAL_CLUSTER_LIMIT: "40"
          SMALL_CLUSTER_THRESHOLD: "4"
        run: |
          uv run python -m high_signal_ingest.pipeline \
            --source "${{ inputs.source || 'all' }}" \
            --days "${{ inputs.days || '1' }}"
