name = "high-signal-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[vars]
ENVIRONMENT = "production"

# Cron triggers — brief precompute runs every 30 min to keep snapshots fresh.
# Daily ingest + scoring also run via GitHub Actions workflows.
[triggers]
crons = ["*/30 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "high-signal-db"
database_id = "ebeab72b-61ab-4588-936c-1da6652a2ce4"
migrations_dir = "../../packages/db/migrations"

# Plan 0009 — Cloudflare Email Routing native send binding. The brief cron in
# workers/api/src/routes/delivery.ts dispatches through env.SEND_EMAIL.
# Setup checklist (operator):
#   1. Add Email Routing to the zone (Dashboard → Email → Email Routing).
#   2. Verify DKIM/SPF for the sending domain (high-signal.app).
#   3. Either set `allowed_destination_addresses` below to a fixed list, or
#      leave it open and rely on Email Routing's per-destination verification.
#   4. Configure `EMAIL_FROM` in [vars] — REQUIRED. Delivery fail-closes to a
#      logged no-op when EMAIL_FROM is unset (no default sender is assumed).
#   5. Optional: set `API_BASE` (for compose + unsubscribe links) and
#      `DELIVERY_UNSUBSCRIBE_SECRET` (falls back to ADMIN_TOKEN) as secrets.
[[send_email]]
name = "SEND_EMAIL"
